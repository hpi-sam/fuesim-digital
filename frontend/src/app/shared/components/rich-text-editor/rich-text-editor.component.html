@if (this.currentRole() === 'trainer') {
    <ng-container>
        <form (ngSubmit)="onSubmit()">
            <div class="NgxEditor__Wrapper">
                <ngx-editor-menu [editor]="editor" [toolbar]="toolbar">
                </ngx-editor-menu>
                <ngx-editor
                    [editor]="editor"
                    [formField]="editorForm.editorContent"
                    [placeholder]="'Hier Text eingeben...'"
                >
                </ngx-editor>
            </div>
            @if (
                editorForm.editorContent().value() ===
                this.userGeneratedContentElement()?.content
            ) {
                <button class="btn btn-outline-success">Gespeichert</button>
            } @else {
                <button type="submit" class="btn btn-primary">Speichern</button>
            }
        </form>
    </ng-container>
}
<hr />
@if (this.currentRole() !== 'trainer') {
    <ng-container>
        <div [innerHTML]="editorForm.editorContent().value()"></div>
    </ng-container>
}
