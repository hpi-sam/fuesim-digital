<h5 class="card-title">Behandlungsphase</h5>
@if ((radiogram$ | async)?.treatmentStatusChanged) {
    <span> Der Behandlungsfortschritt hat sich geändert. </span>
}
<div class="card-text row align-items-center">
    @if ((radiogram$ | async)?.treatmentStatusChanged) {
        <span class="col-sm"> Neue Phase: </span>
    } @else {
        <span class="col-sm">Derzeitige Phase:</span>
    }

    <div class="col-sm">
        <app-treatment-status-badge
            [treatmentProgress]="
                (radiogram$ | async)?.treatmentStatus ?? 'noTreatment'
            "
        ></app-treatment-status-badge>
    </div>
</div>
