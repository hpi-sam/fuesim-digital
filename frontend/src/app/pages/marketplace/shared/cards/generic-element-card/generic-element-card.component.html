<div
    class="card h-100"
    style="cursor: pointer"
    [class.border-success]="showIndicator() === 'created'"
    [class.border-warning]="showIndicator() === 'changed'"
    [class.ghost]="showIndicator() === 'ghost'"
    [class.border-2]="showIndicator()"
>
    @if (image()) {
        @let imgHeight = small() ? 80 : 100;
        <div class="d-flex" [style.height.px]="imgHeight">
            <img
                [src]="image()"
                class="card-img-top p-3 m-auto object-fit-contain"
                [style.max-height.px]="imgHeight"
            />
        </div>
    }
    <div
        class="card-body d-flex flex-column justify-content-between"
        [class.small]="small()"
    >
        <div>
            <span
                class="card-title d-block mb-0"
                [class.h5]="!small()"
                [class.fw-medium]="small()"
            >
                {{ title() }}
            </span>
            @if (subtitle(); as subtitle) {
                <span
                    class="card-subtitle mb-2 text-body-secondary"
                    [class.h6]="!small()"
                >
                    {{ subtitle }}
                </span>
            }
        </div>
        @if (editable()) {
            @if (showIndicator() === 'ghost') {
                <button
                    class="btn btn-outline-secondary btn-sm"
                    (click)="$event.stopPropagation(); restore.emit()"
                >
                    Wiederherstellen
                </button>
            } @else {
                <div class="d-flex flex-row flex-wrap gap-2">
                    <button
                        class="btn btn-outline-primary btn-sm"
                        (click)="$event.stopPropagation(); duplicate.emit()"
                    >
                        <i class="bi bi-copy"></i>
                    </button>
                    <button
                        class="btn btn-outline-danger btn-sm"
                        (click)="$event.stopPropagation(); delete.emit()"
                    >
                        <i class="bi bi-trash"></i>
                    </button>
                </div>
            }
        }
    </div>
</div>
