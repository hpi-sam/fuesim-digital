<div class="modal-header">
    <h4 class="modal-title">Einsatztagebucheintrag erstellen</h4>
    <button type="button" class="btn-close" (click)="cancel()"></button>
</div>
<div class="modal-body">
    <div class="form-group mb-3">
        <label class="form-label">Nachricht</label>
        <textarea
            [formField]="eocLogForm.message"
            [appAutofocus]="true"
            placeholder="Schreiben Sie den neuen Eintrag in dieses Feld..."
            class="form-control no-validation"
            [readOnly]="!editable()"
        ></textarea>
        <app-display-model-validation [field]="eocLogForm.message()" />
    </div>
    <button
        type="button"
        class="btn btn-primary w-100"
        [disabled]="!eocLogForm().valid()"
        (click)="confirm()"
    >
        Eintrag speichern
    </button>
</div>
