<app-simulated-region-preview-card
    [dataCy]="dataCy()"
    [title]="title()"
    [imageUrl]="imageUrl()"
    [darkBackground]="darkBackground()"
>
    @if (patient(); as patient) {
        <div class="d-flex mx-2">
            <app-patient-health-point-display [patientId]="patient.id" />
            <div class="flex-grow-1"></div>
            <app-patient-status-badge [status]="patient.pretriageStatus" />
        </div>
    }
</app-simulated-region-preview-card>
