@if (exercise(); as exercise) {
    <div class="card">
        <div class="card-body">
            <h2 class="card-title h4 d-flex">
                #{{ exercise.trainerId }}
                <app-copy-button [value]="trainerUrl()" />
            </h2>
            <p class="card-text">
                Teilnehmer-ID: {{ exercise.participantId }}
                <app-copy-button [value]="participantUrl()" />
            </p>
        </div>
        <ul class="list-group list-group-flush">
            <li class="list-group-item">
                <i class="bi bi-clock me-2"></i>
                zuletzt benutzt am {{ exercise.lastUsedAt | date: 'medium' }}
            </li>
        </ul>
        <div class="card-body d-flex">
            <a
                [routerLink]="`/exercises/${exercise.trainerId}`"
                class="btn btn-primary me-2"
            >
                Öffnen
            </a>
            <div class="flex-grow-1"></div>
            <button class="btn btn-outline-danger" (click)="deleteExercise()">
                <i class="bi bi-trash me-2"></i>
                Löschen
            </button>
        </div>
    </div>
}
