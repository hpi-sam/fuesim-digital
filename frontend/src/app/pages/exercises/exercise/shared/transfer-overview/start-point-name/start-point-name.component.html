@let startPoint = this.startPoint();
@if (startPoint.type === 'alarmGroupStartPoint') {
    @if (alarmGroupName$ | async; as alarmGroupName) {
        {{ alarmGroupName }}
    } @else {
        Gelöschte Alarmgruppe
    }
}
@if (startPoint.type === 'transferStartPoint') {
    <app-transfer-point-name
        [transferPointId]="startPoint.transferPointId"
    ></app-transfer-point-name>
}
