<div class="ovtRoot" #otvRoot>
    <nav
        ngbNav
        [animation]="false"
        #nav="ngbNav"
        class="nav-tabs"
        [class.fullscreenEnabled]="fullscreenEnabled"
    >
        <ng-container ngbNavItem>
            <button ngbNavLink>Einsatzabschnitte</button>
            <ng-template ngbNavContent>
                <app-operational-sections-tab></app-operational-sections-tab>
            </ng-template>
        </ng-container>
        <ng-container ngbNavItem [destroyOnHide]="false">
            <button ngbNavLink>Einsatzdetails</button>
            <ng-template ngbNavContent>
                <app-operation-details-tab
                    [showExerciseDetails]="fullscreenEnabled"
                ></app-operation-details-tab>
            </ng-template>
        </ng-container>
        <div style="margin-left: auto">
            <button
                class="btn"
                [class.btn-outline-dark]="!fullscreenEnabled"
                [class.btn-outline-light]="fullscreenEnabled"
                title="Vollbildmodus"
                (click)="toggleFullscreen()"
            >
                <span style="padding-right: 8px">
                    {{ fullscreenEnabled ? 'Vollbild verlassen' : 'Vollbild' }}
                </span>
                <i
                    [class.bi-fullscreen]="!fullscreenEnabled"
                    [class.bi-fullscreen-exit]="fullscreenEnabled"
                ></i>
            </button>
        </div>
    </nav>

    <div class="ovtContent flex-grow-1">
        <div [ngbNavOutlet]="nav"></div>
    </div>
</div>
