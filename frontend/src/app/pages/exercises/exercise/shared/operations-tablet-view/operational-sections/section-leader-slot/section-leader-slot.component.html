<div
    class="sectionLeaderSlot"
    cdkDropList
    [cdkDropListEnterPredicate]="onlySigleItemDropPredicate.bind(this)"
    (cdkDropListDropped)="onVehicleDropped($event)"
    [style]="{ '--innerTitle': `'${innerTitle()}'` }"
>
    @if (vehicle(); as vehicle) {
        <app-vehicle-tag [vehicle]="vehicle"></app-vehicle-tag>
    }
</div>
