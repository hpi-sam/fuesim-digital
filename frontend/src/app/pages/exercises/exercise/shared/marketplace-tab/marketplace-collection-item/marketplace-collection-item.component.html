<div class="d-flex justify-content-between align-items-center">
    @if (collectionData.isLoading()) {
        <div class="spinner-border"></div>
    }
    @if (collectionData.hasValue()) {
        <span>
            {{ collectionData.value().title }}
        </span>
        <div class="d-flex flex-row gap-1">
            @let newerVersion = newerVersionAvailable.value();
            @if (newerVersion; as version) {
                @if (version.newerVersionAvailable) {
                    <button class="btn btn-link btn-sm">
                        <i class="bi bi-arrow-clockwise"></i>
                    </button>
                }
            }
            <button
                class="btn btn-link btn-sm text-danger"
                (click)="removeCollection(collection())"
            >
                <i class="bi bi-trash"></i>
            </button>
        </div>
    }
</div>
