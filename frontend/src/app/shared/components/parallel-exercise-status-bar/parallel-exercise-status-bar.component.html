@let participantKey = participantKey$ | async;
@let clientNames = clientNames$ | async;
<div class="d-flex align-items-center me-3">
    <a
        [routerLink]="`/exercises/parallel/${parallelExercise()?.id}`"
        class="btn btn-outline-secondary me-4"
    >
        <i class="bi bi-chevron-left me-2"></i>
        Zurück zur Liste
    </a>
    <h2 class="mb-0">
        Parallelübung:
        <span class="font-monospace fw-bold user-select-all">
            {{ parallelExercise()?.participantKey }}
        </span>
    </h2>
</div>
<div class="me-3">
    <app-exercise-state-badge></app-exercise-state-badge>
</div>
<div ngbDropdown class="switch-exercise-dropdown">
    <button
        type="button"
        class="btn btn-outline-primary"
        ngbDropdownToggle
        [disabled]="!parallelExerciseService.exerciseInstances().length"
    >
        <i class="bi-people me-2"> </i>
        #{{ participantKey }}
        @if (clientNames && clientNames.length) {
            : {{ clientNames.join(', ') }}
        }
    </button>
    <div ngbDropdownMenu>
        @for (
            exerciseInstance of parallelExerciseService.exerciseInstances();
            track exerciseInstance.participantKey
        ) {
            <button
                ngbDropdownItem
                (click)="openExerciseInstance(exerciseInstance)"
                [disabled]="exerciseInstance.participantKey === participantKey"
            >
                #{{ exerciseInstance.participantKey }}
                @if (exerciseInstance.clientNames.length) {
                    : {{ exerciseInstance.clientNames.join(', ') }}
                }
                @if (exerciseInstance.participantKey === participantKey) {
                    <span class="badge bg-primary ms-2">ausgewählt</span>
                }
            </button>
        }
    </div>
</div>
