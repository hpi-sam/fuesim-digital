@if (this.currentRole() === 'trainer') {
    <ng-container>
        <form (ngSubmit)="onSubmit()">
            <div class="NgxEditor__Wrapper">
                <ngx-editor-menu [editor]="editor" [toolbar]="toolbar">
                </ngx-editor-menu>
                <ngx-editor
                    [editor]="editor"
                    [formField]="editorForm.editorContent"
                    [placeholder]="'Hier erkundbare Infos eingeben...'"
                >
                </ngx-editor>
            </div>
            @if (
                editorForm.editorContent().value() ===
                this.userGeneratedContentElement()?.content
            ) {
                <button class="btn btn-outline-success" disabled>
                    Gespeichert
                </button>
            } @else {
                <button type="submit" class="btn btn-primary">Speichern</button>
            }
        </form>
    </ng-container>
} @else {
    <hr />
    <ng-container>
        <div [innerHTML]="editorForm.editorContent().value()"></div>
    </ng-container>
}
<!-- debugging info -->
<hr />
<span> contentId: {{ this.userGeneratedContentId() }}</span>
<span> editor content: {{ this.editorForm.editorContent().value() }}</span>
