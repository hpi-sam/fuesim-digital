<div
    class="card h-100"
    style="cursor: pointer; background: transparent"
    [class.border-success]="showIndicator() === 'created'"
    [class.border-warning]="showIndicator() === 'changed'"
    [class.ghost]="showIndicator() === 'ghost'"
    [class.border-2]="showIndicator()"
>
    @if (image()) {
        @let imgHeight = small() ? 80 : 100;
        <div class="d-flex" [style.height.px]="imgHeight">
            <img
                [src]="image()"
                class="card-img-top p-3 m-auto object-fit-contain"
                [style.max-height.px]="imgHeight"
            />
        </div>
    }
    <div
        class="card-body d-flex flex-column justify-content-between"
        [class.small]="small()"
    >
        <div class="mb-2">
            <span
                class="card-title d-block mb-0"
                [class.h5]="!small()"
                [class.fw-medium]="small()"
            >
                {{ title() }}
            </span>
            @if (subtitle(); as subtitle) {
                <span
                    class="card-subtitle mb-2 text-body-secondary"
                    [class.h6]="!small()"
                >
                    {{ subtitle }}
                </span>
            }
        </div>
        @if (editable()) {
            @if (showIndicator() === 'ghost') {
                <button
                    class="btn btn-outline-secondary btn-sm"
                    (click)="$event.stopPropagation(); restore.emit()"
                >
                    Wiederherstellen
                </button>
            } @else {
                <div class="d-flex flex-row flex-wrap gap-2">
                    @if (editable()) {
                        <!-- a blank button that allows propagating the click event to the card itself,
                         so that clicking the edit button opens the edit view -->
                        <button
                            class="btn btn-outline-primary btn-sm"
                            ngbTooltip="Bearbeiten"
                            placement="bottom"
                        >
                            <i class="bi bi-pencil"></i>
                        </button>
                    }

                    <div ngbDropdown class="d-inline-block">
                        <button
                            type="button"
                            class="btn btn-outline-primary btn-sm"
                            ngbDropdownToggle
                            (click)="$event.stopPropagation()"
                            ngbTooltip="Duplizieren"
                            placement="bottom"
                        >
                            <i class="bi bi-copy"></i>
                        </button>
                        <div ngbDropdownMenu>
                            <button
                                ngbDropdownItem
                                (click)="
                                    $event.stopPropagation(); duplicate.emit()
                                "
                            >
                                <i class="bi bi-arrow-right-square me-1"></i>
                                Diese Sammlung
                            </button>
                            <button
                                ngbDropdownItem
                                (click)="
                                    $event.stopPropagation();
                                    duplicateExternal.emit()
                                "
                            >
                                <i class="bi bi-arrow-up-right-circle me-1"></i>
                                Andere Sammlung
                            </button>
                        </div>
                    </div>
                    <button
                        class="btn btn-outline-danger btn-sm"
                        (click)="$event.stopPropagation(); delete.emit()"
                        ngbTooltip="Löschen"
                        placement="bottom"
                    >
                        <i class="bi bi-trash"></i>
                    </button>
                </div>
            }
        }
    </div>
</div>
