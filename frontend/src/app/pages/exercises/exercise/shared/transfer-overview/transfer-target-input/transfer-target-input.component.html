<div ngbDropdown>
    <button
        type="button"
        class="btn btn-sm btn-outline-primary dropdown-toggle"
        ngbDropdownToggle
    >
        <app-transfer-point-name
            [transferPointId]="transfer().targetTransferPointId"
        ></app-transfer-point-name>
    </button>
    <div ngbDropdownMenu>
        @for (
            transferPoint of transferPoints$ | async | values;
            track transferPoint.id
        ) {
            <button
                ngbDropdownItem
                [disabled]="
                    transferPoint.id === transfer().targetTransferPointId
                "
                (click)="setTransferTarget(transferPoint.id)"
            >
                <app-transfer-point-name
                    [transferPointId]="transferPoint.id"
                ></app-transfer-point-name>
            </button>
        }
    </div>
</div>
