<div class="card">
    <div class="card-body">
        <h2 class="card-title h4 d-flex">
            @if (organisation().userRole === 'admin') {
                <app-inline-text-editor
                    class="flex-grow-1"
                    [required]="true"
                    [value]="organisation().name"
                    name="Name der Organisation"
                    (update)="
                        patchOrganisation({
                            name: $event,
                        })
                    "
                    [singleLine]="true"
                />
            } @else {
                {{ organisation().name }}
            }
        </h2>
    </div>
    <ul class="list-group list-group-flush">
        <li class="list-group-item d-flex">
            @if (organisation().userRole === 'admin') {
                <app-inline-text-editor
                    class="flex-grow-1"
                    [value]="organisation().description"
                    name="Beschreibung der Organisation"
                    (update)="
                        patchOrganisation({
                            description: $event,
                        })
                    "
                />
            } @else {
                {{ organisation().description }}
            }
        </li>
    </ul>
    <div class="card-body d-flex">
        <a
            [routerLink]="`/organisations/${organisation().id}`"
            class="btn btn-primary me-2"
        >
            Öffnen
        </a>
        <div class="flex-grow-1"></div>
    </div>
</div>
