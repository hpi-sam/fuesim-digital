<app-scroll-buttons>
    <div
        #scrollContainer
        class="vehicle-zone d-flex flex-grow-1"
        [class.layout-two-columns]="isY()"
        [class.layout-two-rows]="isX()"
        cdkDropList
        cdkDropListOrientation="mixed"
        (cdkDropListDropped)="
            vehicleDropped.emit({
                vehicleId: $event.item.data,
                position: $event.currentIndex,
            })
        "
    >
        @for (vehicle of vehicles(); track vehicle.id) {
            <app-vehicle-tag [vehicle]="vehicle"></app-vehicle-tag>
        }
    </div>
</app-scroll-buttons>
