<div class="card">
    <h5
        class="card-header d-flex flex-row justify-content-between align-items-center"
    >
        <span>Alarmieren</span>
        <div class="form-check form-switch mt-2" style="font-size: 16px">
            <input
                class="form-check-input"
                type="checkbox"
                [ngModel]="useComplexLayout()"
                (ngModelChange)="setComplexLayout($event)"
                id="complexLayoutToggle"
            />
            <label class="form-check-label" for="complexLayoutToggle">
                Komplexes Layout
            </label>
        </div>
    </h5>
    <div class="card-body">
        <app-send-alarm-group-interface
            [useHotkeys]="false"
            [useAlarmGroupButtons]="!useComplexLayout()"
            [useFirstVehicles]="useComplexLayout()"
        />
    </div>
</div>
