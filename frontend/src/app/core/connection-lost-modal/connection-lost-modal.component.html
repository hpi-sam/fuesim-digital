<div class="modal-header">
    <h4 class="modal-title">
        <i class="bi bi-wifi-off me-2 text-danger"></i>
        Die Verbindung zum Server wurde unterbrochen
    </h4>
</div>
<div class="modal-body lead">
    Bitte laden Sie die Seite neu, um die Verbindung wieder herzustellen.
</div>
<div class="modal-footer d-flex flex-column align-content-center">
    <button type="button" class="btn btn-lg btn-primary" (click)="reload()">
        <i class="bi bi-arrow-clockwise me-1"></i>
        Seite neuladen
    </button>
</div>
