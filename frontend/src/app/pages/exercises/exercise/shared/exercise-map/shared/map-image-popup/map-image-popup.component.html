@if (mapImageId) {
    <h5 class="popover-header">
        @if (currentRole() === 'trainer') {
            Bildinformationen
            <app-help-button
                url="2_exercises/3_exercise_elements.html#bilder"
            />
        } @else {
            Erkundung
        }
        <button
            (click)="closePopup()"
            type="button"
            class="btn-close float-end"
        ></button>
    </h5>
    <div class="popover-body p-0" style="width: 350px">
        <app-map-images-details
            [mapImageId]="mapImageId"
            [openScoutInfo]="openScoutInfo"
        />
    </div>
}
