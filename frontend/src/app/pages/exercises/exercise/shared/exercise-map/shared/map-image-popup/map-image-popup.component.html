@if (mapImage(); as mapImage) {
    <h5 class="popover-header">
        Bildinformationen
        <button
            (click)="closePopup()"
            type="button"
            class="btn-close float-end"
        ></button>
    </h5>
    <div class="popover-body p-0" style="width: 350px">
        <app-map-images-details
            [mapImageId]="mapImage.id"
            [openScoutInfo]="openScoutInfo"
        />
    </div>
}
