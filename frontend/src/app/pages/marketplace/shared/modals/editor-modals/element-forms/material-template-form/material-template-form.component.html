<div class="form-group mb-3">
    <label class="form-label">Name</label>
    <input
        [formField]="materialForm.name"
        type="text"
        class="form-control"
        placeholder="z.B. Großes Material"
    />
    <app-display-model-validation
        [field]="materialForm.name()"
    ></app-display-model-validation>
</div>

<app-image-partial-form [imageForm]="materialForm.image" />

<div class="card">
    <div class="card-body">
        <h5>Patientenbehandlung</h5>

        <app-cater-for-form [caterForForm]="materialForm.canCaterFor" />

        <div class="row row-cols-2">
            <div class="form-group mb-3">
                <label class="form-label">Behandlungsreichweite</label>
                <input
                    [formField]="materialForm.treatmentRange"
                    type="number"
                    class="form-control"
                    placeholder="z.B. 5.5"
                />
                <app-display-model-validation
                    [field]="materialForm.treatmentRange()"
                ></app-display-model-validation>
            </div>

            <div class="form-group mb-3">
                <label class="form-label"
                    >Überschreibende Behandlungsreichweite</label
                >
                <input
                    [formField]="materialForm.overrideTreatmentRange"
                    type="number"
                    class="form-control"
                    placeholder="z.B. 2.5"
                />
                <app-display-model-validation
                    [field]="materialForm.overrideTreatmentRange()"
                ></app-display-model-validation>
            </div>
        </div>
    </div>
</div>

<app-marketplace-form-submit-button-bar
    [form]="materialForm"
    [type]="data().type"
    [disabled]="disabled()"
    (submitData)="submitData()"
    (discardChanges)="discardChanges.emit()"
/>
