@if ((exerciseStatus$ | async) === 'running') {
    <button
        (click)="pauseExercise()"
        class="btn btn-primary"
        data-cy="trainerToolbarPauseButton"
    >
        Pause
    </button>
}
@if ((exerciseStatus$ | async) !== 'running') {
    <button
        (click)="startExercise()"
        class="btn btn-primary"
        data-cy="trainerToolbarStartButton"
    >
        Start
    </button>
}
