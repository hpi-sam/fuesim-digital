<div class="onLocationVehiclesSection">
    <span class="label">Vor Ort</span>
    <div
        cdkDropList
        class="onLocationVehiclesContainer"
        (cdkDropListDropped)="onVehicleDropped($event)"
        cdkDropListOrientation="mixed"
    >
        @for (vehicle of vehicles$ | async; track vehicle.id) {
            <app-vehicle-tag [vehicle]="vehicle"></app-vehicle-tag>
        }
    </div>
</div>
