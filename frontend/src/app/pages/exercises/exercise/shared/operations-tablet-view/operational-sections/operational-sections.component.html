<div
    cdkDropListGroup
    class="operational-sections-stack d-flex flex-column overflow-hidden h-100"
>
    <div class="section-gap d-flex">
        <app-local-operational-leader />
        @for (section of operationalSections(); track section.id) {
            <app-operational-section-container
                [operationalSection]="section"
            ></app-operational-section-container>
        }
        <button
            (click)="addOperationalSection()"
            class="btn btn-outline-dark fixed-panel-width border-dashed-style flex-shrink-0"
        >
            Einsatzabschnitt hinzufügen
        </button>
    </div>

    <div class="d-flex w-100 flex-shrink-0">
        <app-vehicles-on-location class="d-block w-100" />
    </div>
</div>
