<app-show-more defaultHeight="100px">
    @if (message().config.body; as body) {
        {{ body }}
    }
    @if (message().config.button; as button) {
        <button
            [class]="'btn btn-sm ms-2 btn-' + button.color"
            (click)="message().event$.next('click')"
        >
            {{ button.name }}
        </button>
    }
</app-show-more>
