@if (edit) {
    <form class="d-flex flex-grow-1" (submit)="save()">
        <textarea
            #inlineInput="ngModel"
            class="form-control form-control-sm"
            rows="3"
            [(ngModel)]="newValue"
            name="inline"
            autofocus
        ></textarea>
        <app-display-validation
            [ngModelInput]="inlineInput"
        ></app-display-validation>

        <button class="btn btn-primary ms-2" type="submit">
            <i class="bi bi-save"></i>
        </button>
    </form>
} @else {
    <div class="d-flex">
        <div class="flex-grow-1">
            @if (value()) {
                {{ value() }}
            } @else {
                –
            }
        </div>
        <button class="btn btn-sm" (click)="startEdit()">
            <i class="bi bi-pencil"></i>
        </button>
    </div>
}
