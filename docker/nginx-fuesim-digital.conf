server {
    listen 80;
    server_name _;

    access_log off;

    add_header Referrer-Policy                      "no-referrer"   always;
    add_header X-Content-Type-Options               "nosniff"       always;
    add_header X-Download-Options                   "noopen"        always;
    add_header X-Frame-Options                      "allow-from SAMEORIGIN" always;
    add_header X-Permitted-Cross-Domain-Policies    "none"          always;
    add_header X-Robots-Tag                         "none"          always;
    add_header X-XSS-Protection                     "1; mode=block" always;

    # This can be overwritten using the DFM_UPLOAD_LIMIT environment variable
    client_max_body_size 200m;

    # Frontend
    root /usr/local/app/frontend;
    error_page 404 /index.html;
    error_page 403 /index.html;

    location /assets/about {
        # Requests to this location should not fall back to index.html
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # API
    location /api {
        proxy_pass         http://localhost:3201;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Websocket
    location /socket.io {
        proxy_pass         http://localhost:3200;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "Upgrade";
    }
}
