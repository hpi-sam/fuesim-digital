<div class="modal-header">
    <h4 class="modal-title">
        Fahrzeugvorlage hinzufügen
        <app-help-button
            url="2_exercises/3_exercise_elements.html#fahrzeuge-mit-personal-und-material"
        />
    </h4>
    <button type="button" class="btn-close" (click)="close()"></button>
</div>
<div class="modal-body">
    <app-vehicle-template-form
        [initialValues]="{
            url: editableVehicleTemplateValues.url,
            height: editableVehicleTemplateValues.height,
            name: editableVehicleTemplateValues.name,
            type: editableVehicleTemplateValues.type,
            patientCapacity: editableVehicleTemplateValues.patientCapacity,
            materialTemplates: editableVehicleTemplateValues.materialTemplates,
            personnelTemplates:
                editableVehicleTemplateValues.personnelTemplates,
        }"
        (submitVehicleTemplate)="createVehicleTemplate($event)"
        [btnText]="'Fahrzeugvorlage hinzufügen'"
    ></app-vehicle-template-form>
</div>
