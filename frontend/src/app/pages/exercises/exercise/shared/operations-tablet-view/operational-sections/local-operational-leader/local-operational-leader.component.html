<div
    class="localOperationalLeaderContainer d-flex flex-column bg-white border h-100"
>
    <span class="label">Leitung</span>
    <div class="mt-2">
        <app-section-leader-slot
            [vehicle]="(localSectionLeader$ | async) ?? null"
            (vehicleAssigned)="onVehicleAssigned($event)"
        ></app-section-leader-slot>
    </div>
    <span class="label">Vor Ort</span>
    @let vehicles = vehicles$ | async;
    @if (vehicles !== null) {
        <app-vehicles-zone
            [vehicles]="vehicles"
            (vehicleDropped)="onVehicleDroppedUnassignment($event)"
        />
    }
</div>
