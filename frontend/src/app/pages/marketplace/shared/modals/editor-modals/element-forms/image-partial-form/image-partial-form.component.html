<div class="form-group mb-3">
    <label class="form-label">Bildadresse:</label>
    <input
        [formField]="imageForm().url"
        appImageExistsValidator
        type="url"
        class="form-control"
        placeholder="https://example.com/image.png"
    />
    <app-display-model-validation
        [field]="imageForm().url()"
    ></app-display-model-validation>
</div>
<div class="form-group mb-3">
    <label class="form-label">Bildhöhe:</label>
    <input
        [formField]="imageForm().height"
        step="1"
        appIntegerValidator
        type="number"
        class="form-control"
        placeholder="100"
    />
    <app-display-model-validation
        [field]="imageForm().height()"
    ></app-display-model-validation>
</div>
