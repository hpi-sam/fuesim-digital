<div class="modal-header">
    <h4 class="modal-title">
        {{ isEditMode ? 'Maßnahme bearbeiten' : 'Maßnahme hinzufügen' }}
    </h4>
    <button type="button" class="btn-close" (click)="close()"></button>
</div>
@if (measureTemplateValues) {
    <div class="modal-body">
        <app-measure-template-form
            [initialValues]="measureTemplateValues"
            [btnText]="isEditMode ? 'Speichern' : 'Maßnahme hinzufügen'"
            (submitMeasureTemplate)="submitMeasureTemplate($event)"
        />

        @if (isEditMode) {
            <button
                class="btn btn-danger float-end"
                (click)="deleteMeasureTemplate()"
            >
                <i class="bi bi-trash-fill"></i>
                Löschen
            </button>
        }
    </div>
}
