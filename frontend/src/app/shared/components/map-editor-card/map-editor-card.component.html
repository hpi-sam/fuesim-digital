<div
    class="card text-center me-1 mb-1"
    (mousedown)="elementMousedown.emit($event)"
    [attr.data-cy]="dataCy()"
    [class.border-primary]="selected()"
>
    <ng-content>
        <div
            class="preview-image-container"
            [class.bg-secondary]="darkBackground()"
        >
            <img [src]="imageUrl()" class="card-img-top" />
        </div>
        <div style="top: 0; right: 0" class="position-absolute">
            @if (enableEditButton()) {
                <button
                    (mousedown)="elementEdit.emit(); $event.stopPropagation()"
                    class="btn btn-outline-warning btn-sm"
                >
                    <i class="bi bi-pencil-fill"></i>
                </button>
            }
            @if (enableDeleteButton()) {
                <button
                    (mousedown)="elementDelete.emit(); $event.stopPropagation()"
                    class="btn btn-outline-danger btn-sm"
                >
                    <i class="bi bi-trash"></i>
                </button>
            }
        </div>
        <div class="card-body px-1 pb-0 pt-2">
            <h6 class="text-truncate" [ngbTooltip]="title()" placement="bottom">
                {{ title() }}
            </h6>
        </div>
    </ng-content>
</div>
