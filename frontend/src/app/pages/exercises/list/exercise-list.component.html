<app-header />
<div class="container">
    <h1>
        Meine Übungen
        <button class="btn btn-primary float-end">Neue Übung erstellen</button>
    </h1>
    @if (exercises.isLoading()) {
        <div class="row row-cols-3">
            @for (time of 3 | times; track $index) {
                <div class="col">
                    <div class="card" aria-hidden="true">
                        <div class="card-body">
                            <h2 class="card-title h4 placeholder-glow">
                                <span class="placeholder col-6"></span>
                            </h2>
                            <p class="card-text placeholder-glow">
                                <span class="placeholder col-4"></span>
                                <span class="placeholder col-4"></span>
                            </p>
                            <a
                                class="btn btn-primary disabled placeholder col-6"
                                aria-disabled="true"
                            ></a>
                        </div>
                    </div>
                </div>
            }
        </div>
    }
    @if (exercises.hasValue()) {
        <div class="row row-cols-3">
            @for (exercise of exercises.value(); track exercise.trainerId) {
                <div class="col">
                    <app-exercise-card [exercise]="exercise" />
                </div>
            }
        </div>
    }
</div>
<app-footer />
