@if (personnel$ | async; as personnel) {
    <h5 class="popover-header">
        {{ personnel.typeName }}
        von
        {{ personnel.vehicleName }}
        <button
            (click)="closePopup()"
            type="button"
            class="btn-close float-end"
        ></button>
    </h5>
    <div class="popover-body" style="max-width: 350px">
        <app-personnel-details [personnelId]="personnel.id" />
    </div>
}
