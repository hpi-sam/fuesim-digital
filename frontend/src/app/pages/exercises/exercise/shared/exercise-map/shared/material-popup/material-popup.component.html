@if (material$ | async; as material) {
    <h5 class="popover-header">
        <strong>{{ material.typeName }}</strong>
        aus {{ material.vehicleName }}
        <button
            (click)="closePopup()"
            type="button"
            class="btn-close float-end"
        ></button>
    </h5>
    <div class="popover-body" style="max-width: 350px">
        <app-material-details [materialId]="material.id" />
    </div>
}
