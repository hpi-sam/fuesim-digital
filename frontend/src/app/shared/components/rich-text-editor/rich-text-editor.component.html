@if (this.currentRole() === 'trainer') {
    <form class="m-2">
        <div class="NgxEditor__Wrapper mb-2">
            <ngx-editor-menu [editor]="editor" [toolbar]="toolbar">
            </ngx-editor-menu>
            <ngx-editor
                [editor]="editor"
                [formField]="editorForm.editorContent"
                [placeholder]="'Hier Erkundungsinformationen eingeben ...'"
            >
            </ngx-editor>
        </div>
        @if (
            editorForm.editorContent().value() ===
            this.userGeneratedContentElement().content
        ) {
            <button class="btn btn-outline-success" disabled>
                Gespeichert
                <i class="bi bi-check"></i>
            </button>
        } @else {
            <button class="btn btn-primary" (click)="onSubmit()" type="button">
                Speichern
            </button>
        }
    </form>
} @else {
    <div class="m-2" [innerHTML]="editorForm.editorContent().value()"></div>
}
