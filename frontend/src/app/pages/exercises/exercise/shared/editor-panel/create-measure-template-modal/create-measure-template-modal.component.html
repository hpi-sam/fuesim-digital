<div class="modal-header">
    <h4 class="modal-title">Maßnahme hinzufügen</h4>
    <button type="button" class="btn-close" (click)="close()"></button>
</div>
<div class="modal-body">
    <app-measure-template-form
        [initialValues]="{
            name: editableMeasureTemplateValues.name,
            properties: editableMeasureTemplateValues.properties,
        }"
        btnText="Maßnahme hinzufügen"
        (submitMeasureTemplate)="createMeasureTemplate($event)"
    />
</div>
