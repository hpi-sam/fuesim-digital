<div>
    @if (scoutable(); as scoutable) {
        <button (click)="assignContent()">Info-Block hinzufügen</button>
    }
</div>
<div>
    @if (scoutable(); as scoutable) {
        @for (contentId of scoutable.userGeneratedContentIds; track contentId) {
            <app-rich-text-editor
                [contentAssignedElement]="scoutable"
                [userGeneratedContentId]="contentId"
            />
        }
    }
</div>
