<div class="card">
    <div class="card-header d-flex align-items-center justify-content-between">
        <h5 class="my-0">Alarmieren</h5>
        <div class="form-check form-switch my-0">
            <input
                class="form-check-input"
                type="checkbox"
                [ngModel]="useComplexLayout()"
                (ngModelChange)="setComplexLayout($event)"
                id="complexLayoutToggle"
            />
            <label class="form-check-label" for="complexLayoutToggle">
                Komplexes Layout
            </label>
        </div>
        <app-help-button url="2_exercises/4_conduction.html#alarmierungen" />
    </div>
    <div class="card-body">
        <app-send-alarm-group-interface
            [useHotkeys]="false"
            [useAlarmGroupButtons]="!useComplexLayout()"
            [useFirstVehicles]="useComplexLayout()"
        />
    </div>
</div>
