<ng-container *ngIf="materialTemplate$ | async as materialTemplate">
    <div class="preview-image-container pb-0">
        <img [src]="materialTemplate.image.url" />
    </div>
    <div class="card-body px-1 pb-0 pt-2">
        <h6
            class="text-truncate"
            [ngbTooltip]="materialTypeNames[materialTemplate.materialType]"
            placement="bottom"
        >
            {{ materialTemplate.name }}
        </h6>
    </div>
</ng-container>
