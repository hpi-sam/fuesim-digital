<a
    class="card d-block text-decoration-none"
    [routerLink]="'/collections/' + collection().entityId"
    [queryParams]="{ from: fromLocation() }"
>
    <div class="card-header">
        {{ collection().title }}
    </div>
    <ul class="list-group list-group-flush">
        <li class="list-group-item">
            Erstellt am: {{ collection().createdAt | date }}
        </li>
        <li class="list-group-item">Zuletzt bearbeitet: {{ collection().editedAt | date}}</li>
        <li class="list-group-item">{{collection().elementCount }} Einträge
            @if(collection().draftState){
                <br/><div class="badge text-bg-secondary">enthält nicht aktualisierte Änderungen</div>
            }
        </li>
    </ul>
</a>
